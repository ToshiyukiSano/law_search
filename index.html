<!DOCTYPE html>

<body>
  <header>
    <h1><a href="./">法令検索</a></h1>

  <main class="index-main">
    <div class="law-search-bar">

      <button id="law-search-btn">検索</button>

    <div class="options">

        <input type="checkbox" id="opt-amended">

    <ul class="law-list" id="law-list">
      <li><a href="law.html?id=321CONSTITUTION" data-law-id="321CONSTITUTION">憲法</a></li>

      <li><a href="law.html?id=408AC0000000109" data-law-id="408AC0000000109">民事訴訟法</a></li>
      <li><a href="law.html?id=323AC0000000131" data-law-id="323AC0000000131">刑事訴訟法</a></li>
    </ul>

    <p class="index-footer">使い方は<a href="manual.html">こちら</a></p>
  </main>

  <button class="page-top-btn" id="page-top-btn" title="ページトップへ">
    <img src="img/arrow.svg" alt="↑">
  </button>

  <script src="js/main.js"></script>
</body>
</html>
